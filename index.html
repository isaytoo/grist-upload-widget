<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap');
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* === THÈME CLAIR (défaut) === */
    :root {
      --bg-page:    #f5f5f7;
      --bg-card:    #ffffff;
      --border:     #d1d1d6;
      --text:       #1c1c1e;
      --text-muted: #6e6e73;
      --accent:     #007aff;
      --accent-hover: #0066d6;
      --btn-text:   #ffffff;
      --btn-disabled-bg:  #d1d1d6;
      --btn-disabled-txt: #8e8e93;
      --progress-bg:#e5e5ea;
      --progress-bar:#34c759;
      --input-bg:   #f5f5f7;
      --input-border: #c7c7cc;
    }

    /* === THÈME SOMBRE (automatique si OS/Grist en dark) === */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:    #0f0f10;
        --bg-card:    #1a1a1e;
        --border:     #2e2e35;
        --text:       #f0f0f0;
        --text-muted: #888888;
        --accent:     #e8ff47;
        --accent-hover: #f0ff75;
        --btn-text:   #000000;
        --btn-disabled-bg:  #333333;
        --btn-disabled-txt: #666666;
        --progress-bg:#0f0f10;
        --progress-bar:#47ffb2;
        --input-bg:   #0f0f10;
        --input-border: #2e2e35;
      }
    }

    body { 
      background: var(--bg-page); 
      color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 15px;
      min-height: 100vh;
    }

    .card { 
      background: var(--bg-card); 
      padding: 24px; 
      border-radius: 12px; 
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    h1 { 
      font-family: 'Syne', sans-serif; 
      font-size: 18px; 
      margin-bottom: 18px; 
      color: var(--text);
      text-align: center;
      letter-spacing: -0.3px;
    }

    .input-group { margin-bottom: 16px; }

    input[type="file"] { 
      width: 100%; 
      padding: 10px 12px;
      background: var(--input-bg);
      border: 1px dashed var(--input-border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
    }

    button { 
      width: 100%; 
      background: var(--accent); 
      border: none; 
      padding: 14px; 
      font-weight: 600;
      border-radius: 8px; 
      cursor: pointer; 
      transition: background 0.2s ease, transform 0.1s ease;
      color: var(--btn-text);
      font-size: 14px;
      letter-spacing: 0.1px;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled { 
      background: var(--btn-disabled-bg); 
      color: var(--btn-disabled-txt); 
      cursor: not-allowed;
      transform: none;
    }

    .progress-container { 
      width: 100%;
      background: var(--progress-bg);
      height: 6px; 
      border-radius: 3px; 
      display: none; 
      margin: 12px 0;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #progressBar { 
      width: 0%; 
      height: 100%; 
      background: var(--progress-bar);
      transition: width 0.3s ease;
    }

    #status { 
      font-size: 12px; 
      color: var(--text-muted); 
      text-align: center; 
      margin-top: 12px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Upload de fichier</h1>
  
  <div class="input-group">
    <input type="file" id="fileInput">
  </div>
  
  <div class="progress-container" id="progressContainer">
    <div id="progressBar"></div>
  </div>
  
  <button id="uploadBtn" disabled>Enregistrer dans Grist</button>
  <p id="status">Chargement...</p>
</div>

<script>
  // --- CONFIGURATION ---
  const CLOUD_NAME = "dadhciq0z";
  const UPLOAD_PRESET = "grist_widget";
  // ---------------------

  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const status = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const progressContainer = document.getElementById('progressContainer');

  let mappedColumn = null;

  grist.ready({
    requiredAccess: 'full',
    columns: [{ name: 'Lien', title: 'Colonne de destination', type: 'Text' }]
  });

  // onRecords se déclenche même quand la table est vide
  grist.onRecords((records, mappings) => {
    if (mappings && mappings.Lien) {
      mappedColumn = mappings.Lien;
      status.innerText = "✅ Prêt";
    } else {
      mappedColumn = null;
      status.innerText = "⚙️ Configurez la colonne dans le panel de droite.";
    }
  });

  fileInput.addEventListener('change', () => {
    uploadBtn.disabled = !fileInput.files.length;
  });

  uploadBtn.onclick = async () => {
    const file = fileInput.files[0];
    if (!file) return alert("Veuillez choisir un fichier d'abord.");

    if (!mappedColumn) {
      status.innerText = "⚙️ Configurez la colonne dans le panel de droite.";
      return;
    }

    uploadBtn.disabled = true;
    progressContainer.style.display = 'block';
    progressBar.style.backgroundColor = 'var(--progress-bar)';
    status.innerText = "Téléchargement vers Cloudinary...";

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, true);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        progressBar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
      }
    };

    xhr.onload = async () => {
      const response = JSON.parse(xhr.responseText);
      
      if (xhr.status >= 200 && xhr.status < 300) {
        const fileUrl = response.secure_url;
        status.innerText = "💾 Enregistrement dans Grist...";

        try {
          const tableId = await grist.getSelectedTableId();
          await grist.docApi.applyUserActions([
            ['AddRecord', tableId, null, { [mappedColumn]: fileUrl }]
          ]);
          
          status.innerText = "✅ Fichier enregistré avec succès !";
          fileInput.value = "";
          uploadBtn.disabled = true;

          setTimeout(() => { 
            progressContainer.style.display = 'none'; 
            progressBar.style.width = '0%';
            status.innerText = "✅ Prêt";
          }, 3000);

        } catch (gristErr) {
          status.innerText = "❌ Erreur Grist : " + gristErr.message;
          uploadBtn.disabled = false;
        }
      } else {
        status.innerText = "❌ Erreur Cloudinary : " + (response.error ? response.error.message : "Vérifiez votre Preset");
        progressBar.style.backgroundColor = '#ff3b30';
        uploadBtn.disabled = false;
      }
    };

    xhr.onerror = () => {
      status.innerText = "❌ Erreur réseau ou blocage CORS.";
      uploadBtn.disabled = false;
    };

    xhr.send(formData);
  };
</script>

</body>
</html>
