<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&display=swap');
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: #0f0f10; 
      color: #f0f0f0; 
      font-family: sans-serif; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
    }

    .card { 
      background: #1a1a1e; 
      padding: 20px; 
      border-radius: 10px; 
      border: 1px solid #2e2e35; 
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    h1 { 
      font-family: 'Syne', sans-serif; 
      font-size: 18px; 
      margin-bottom: 15px; 
      color: #e8ff47; 
      text-align: center;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input[type="file"] { 
      width: 100%; 
      padding: 10px;
      background: #0f0f10;
      border: 1px dashed #2e2e35;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
    }

    button { 
      width: 100%; 
      background: #e8ff47; 
      border: none; 
      padding: 14px; 
      font-weight: bold; 
      border-radius: 6px; 
      cursor: pointer; 
      transition: all 0.2s ease;
      color: #000;
      font-size: 14px;
    }

    button:hover:not(:disabled) {
      background: #f0ff75;
      transform: translateY(-1px);
    }

    button:disabled { 
      background: #333; 
      color: #666; 
      cursor: not-allowed; 
    }

    .progress-container { 
      width: 100%; 
      background: #0f0f10; 
      height: 10px; 
      border-radius: 5px; 
      display: none; 
      margin: 10px 0;
      overflow: hidden;
      border: 1px solid #2e2e35;
    }

    #progressBar { 
      width: 0%; 
      height: 100%; 
      background: #47ffb2; 
      transition: width 0.3s ease; 
    }

    #status { 
      font-size: 12px; 
      color: #888; 
      text-align: center; 
      margin-top: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Upload de fichier</h1>
  
  <div class="input-group">
    <input type="file" id="fileInput">
  </div>
  
  <div class="progress-container" id="progressContainer">
    <div id="progressBar"></div>
  </div>
  
  <button id="uploadBtn" disabled>Enregistrer dans Grist</button>
  <p id="status">✅ Prêt</p>
</div>

<script>
  // --- CONFIGURATION ---
  const CLOUD_NAME = "dadhciq0z";
  const UPLOAD_PRESET = "grist_widget";
  // ---------------------

  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const status = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const progressContainer = document.getElementById('progressContainer');

  let mappedColumn = null; // Nom réel de la colonne, résolu via le mapping

  // Initialisation avec déclaration du mapping de colonne
  grist.ready({
    requiredAccess: 'full',
    columns: [{ name: 'Lien', title: 'Colonne de destination', type: 'Text' }]
  });

  // Récupération du mapping dès que Grist le fournit
  grist.onOptions((options, interaction) => {
    if (interaction && interaction.columns && interaction.columns.Lien) {
      mappedColumn = interaction.columns.Lien;
    }
  });

  // Activer le bouton uniquement quand un fichier est sélectionné
  fileInput.addEventListener('change', () => {
    uploadBtn.disabled = !fileInput.files.length;
  });

  uploadBtn.onclick = async () => {
    const file = fileInput.files[0];
    if (!file) return alert("Veuillez choisir un fichier d'abord.");

    if (!mappedColumn) {
      status.innerText = "⚙️ Configurez la colonne dans le panel de droite.";
      return;
    }

    uploadBtn.disabled = true;
    progressContainer.style.display = 'block';
    progressBar.style.backgroundColor = "#47ffb2";
    status.innerText = "Téléchargement vers Cloudinary...";

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, true);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        progressBar.style.width = percent + '%';
      }
    };

    xhr.onload = async () => {
      const response = JSON.parse(xhr.responseText);
      
      if (xhr.status >= 200 && xhr.status < 300) {
        const fileUrl = response.secure_url;
        status.innerText = "💾 Enregistrement dans Grist...";

        try {
          const tableId = await grist.getSelectedTableId();
          // Utilise le nom réel de la colonne via le mapping
          await grist.docApi.applyUserActions([
            ['AddRecord', tableId, null, { [mappedColumn]: fileUrl }]
          ]);
          
          status.innerText = "✅ Fichier enregistré avec succès !";
          fileInput.value = "";
          uploadBtn.disabled = true;

          setTimeout(() => { 
            progressContainer.style.display = 'none'; 
            progressBar.style.width = '0%';
            status.innerText = "✅ Prêt";
          }, 3000);

        } catch (gristErr) {
          console.error("Erreur Grist:", gristErr);
          status.innerText = "❌ Erreur Grist : " + gristErr.message;
          uploadBtn.disabled = false;
        }
      } else {
        console.error("Erreur Cloudinary:", response);
        status.innerText = "❌ Erreur Cloudinary : " + (response.error ? response.error.message : "Vérifiez votre Preset");
        progressBar.style.backgroundColor = "#ff4747";
        uploadBtn.disabled = false;
      }
    };

    xhr.onerror = () => {
      status.innerText = "❌ Erreur réseau ou blocage CORS.";
      uploadBtn.disabled = false;
    };

    xhr.send(formData);
  };
</script>

</body>
</html>
